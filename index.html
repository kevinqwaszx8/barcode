<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>祥威藥局盤點工具 - 雲端高級版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            margin: 0; padding: env(safe-area-inset-top) 12px 20px;
            background: var(--bg); color: var(--primary);
        }

        .section {
            background: #fff; border-radius: 12px; padding: 12px;
            margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h1 { font-size: 18px; text-align: center; margin: 10px 0; color: var(--primary); }

        #db-status {
            font-size: 11px; text-align: center; padding: 3px;
            border-radius: 4px; background: #eee; margin-bottom: 5px;
        }
        .online { background: #d1f2eb !important; color: #16a085; }

        /* 掃描區域置中 */
        #reader-wrapper {
            position: relative; width: 100%; max-width: 400px; margin: 0 auto;
            border-radius: 12px; overflow: hidden; 
            border: 2px solid var(--primary); background: #000;
            height: 180px; display: flex; align-items: center; justify-content: center;
        }
        #reader { width: 100%; }

        label { display: block; font-size: 12px; color: #7f8c8d; margin-bottom: 2px; margin-top: 8px; }
        
        input, select {
            width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ddd;
            border-radius: 6px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }
        input[readonly] { background-color: #f0f0f0; color: #7f8c8d; border: 1px dashed #ccc; }

        .btn-flex { display: flex; gap: 8px; margin: 8px 0; }
        button {
            flex: 1; padding: 10px; font-size: 14px; font-weight: 600;
            border-radius: 8px; border: none; cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-torch { background: #f1c40f; color: #000; flex: 0.3; }
        
        .table-container { overflow-x: auto; background: #fff; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #fafafa; color: #64748b; }

        .last-scanned {
            text-align: center; font-size: 14px; font-weight: bold; 
            color: var(--accent); margin: 5px 0;
        }
    </style>
</head>
<body>

<h1>祥威藥局盤點工具</h1>
<div id="db-status">正在同步雲端品名...</div>

<div class="section">
    <label>使用者</label>
    <input type="text" id="user" placeholder="請輸入姓名">
</div>

<div class="section" style="padding: 8px;">
    <div id="reader-wrapper">
        <div id="reader"></div>
    </div>
    <div class="btn-flex">
        <button id="btn-start" class="btn-primary">📷 開啟相機</button>
        <button id="btn-torch" class="btn-torch">🔦</button>
        <button id="btn-stop" style="background:#ddd; flex:0.5">關閉</button>
    </div>
    <div id="last-barcode-display" class="last-scanned">等待掃描...</div>
</div>

<div class="section">
    <div style="display:flex; gap:8px;">
        <div style="flex:1.5">
            <label>條碼 (可手動修改)</label>
            <input type="text" id="barcode" placeholder="掃描或輸入條碼">
        </div>
        <div style="flex:1">
            <label>電腦庫存量 (唯讀)</label>
            <input type="text" id="comp-stock" readonly value="0">
        </div>
    </div>

    <label>品名 (可手動修改)</label>
    <input type="text" id="name" placeholder="自動帶入品名...">

    <div style="display:flex; gap:8px; align-items: flex-end;">
        <div style="flex:1">
            <label>盤點數量</label>
            <input type="number" id="qty" value="1">
        </div>
        <div style="flex:2">
            <label>效期</label>
            <div style="display:flex; gap:4px;">
                <select id="exp-y"></select>
                <select id="exp-m">
                    <option value="">月</option>
                    <script>for(let i=1;i<=12;i++) document.write(`<option value="${String(i).padStart(2,'0')}">${i}月</option>`)</script>
                </select>
                <select id="exp-d"></select>
            </div>
        </div>
    </div>

    <label>儲位 / 備註</label>
    <input type="text" id="note" placeholder="例如：A架、冷藏櫃...">

    <button id="btn-add" class="btn-accent" style="width:100%; margin-top:12px; font-size: 16px;">加入清單</button>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>使用者</th>
                <th>品名</th>
                <th>條碼</th>
                <th>數量</th>
                <th>電腦庫存</th>
                <th>儲位</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<div class="btn-flex" style="margin-top:20px;">
    <button onclick="exportExcel()" style="background:#3498db; color:#fff;">📥 匯出 Excel</button>
    <button onclick="clearAll()" style="background:#f2dede; color:#a94442;">清空全部</button>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRYlvRc0iS91LtXg1laxAMKADMYTXOFGHENh3E-g5QqDCV08F1O8PzfzWEiGdAAwzJpkeiJ2rWBR05t/pub?gid=1142644173&single=true&output=csv";
    const STORAGE_KEY = "xw_inventory_v3"; // 升級版本 key
    
    let barcodeMap = {};
    let records = [];
    let scanner = null;
    let isTorchOn = false;

    // 初始化選單
    const yearSel = document.getElementById('exp-y');
    const daySel = document.getElementById('exp-d');
    const thisYear = new Date().getFullYear();
    yearSel.innerHTML = `<option value="">年</option>` + Array.from({length:11}, (_,i)=>`<option value="${thisYear+i}">${thisYear+i}</option>`).join('');
    daySel.innerHTML = `<option value="">日</option>` + Array.from({length:31}, (_,i)=>`<option value="${String(i+1).padStart(2,'0')}">${i+1}</option>`).join('');

    // 1. 抓取雲端資料 (A:條碼, B:品名, C:電腦庫存)
    async function initCloudDB() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const lines = text.split(/\r?\n/);
            lines.forEach(line => {
                if (!line.trim()) return;
                let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    const id = cols[0].replace(/"/g, '').trim();
                    const name = cols[1].replace(/"/g, '').trim();
                    const stock = cols[2] ? cols[2].replace(/"/g, '').trim() : "0"; // 抓取 C 欄
                    
                    if(id && id !== "item_id" && id !== "條碼") {
                        barcodeMap[id] = { name: name, stock: stock };
                    }
                }
            });
            document.getElementById('db-status').textContent = `✅ 雲端同步完成 (${Object.keys(barcodeMap).length} 筆)`;
            document.getElementById('db-status').className = 'online';
        } catch (e) {
            document.getElementById('db-status').textContent = "⚠️ 無法載入雲端，使用離線紀錄";
        }
    }

    // 2. 啟動高速掃描
    async function startScanner() {
        if (!scanner) scanner = new Html5Qrcode("reader");
        const config = {
            fps: 60,
            qrbox: { width: 250, height: 120 },
            aspectRatio: 1.0,
            experimentalFeatures: { useBarCodeDetectorIfSupported: true },
            videoConstraints: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, focusMode: "continuous" }
        };
        try {
            await scanner.start({ facingMode: "environment" }, config, (text) => {
                if (text === document.getElementById('barcode').value) return; 
                if (navigator.vibrate) navigator.vibrate(60);
                updateInputsByBarcode(text);
                document.getElementById('last-barcode-display').textContent = "✔ 掃描成功：" + text;
            });
        } catch (err) { alert("相機啟動失敗，請檢查權限"); }
    }

    // 根據條碼更新品名與庫存
    function updateInputsByBarcode(bc) {
        document.getElementById('barcode').value = bc;
        if (barcodeMap[bc]) {
            document.getElementById('name').value = barcodeMap[bc].name;
            document.getElementById('comp-stock').value = barcodeMap[bc].stock;
        } else {
            document.getElementById('name').value = "";
            document.getElementById('comp-stock').value = "0";
            document.getElementById('name').placeholder = "查無此藥，請手動輸入";
        }
    }

    document.getElementById('barcode').addEventListener('input', (e) => updateInputsByBarcode(e.target.value.trim()));

    // 3. 加入清單
    document.getElementById('btn-add').addEventListener('click', () => {
        const user = document.getElementById('user').value.trim();
        const bc = document.getElementById('barcode').value.trim();
        const nm = document.getElementById('name').value.trim();
        const stock = document.getElementById('comp-stock').value;
        
        if (!user) return alert("請輸入使用者姓名");
        if (!bc) return alert("請輸入或掃描條碼");

        const expiry = yearSel.value ? `${yearSel.value}/${document.getElementById('exp-m').value}/${daySel.value}` : "未填";

        records.unshift({
            user: user,
            name: nm || "手動項目",
            barcode: bc,
            qty: document.getElementById('qty').value,
            compStock: stock,
            expiry: expiry,
            note: document.getElementById('note').value,
            time: new Date().toLocaleString()
        });

        updateTable();
        saveToLocal();
        
        // 加入後清空 (保留使用者與備註方便連續作業)
        document.getElementById('barcode').value = "";
        document.getElementById('name').value = "";
        document.getElementById('comp-stock').value = "0";
        document.getElementById('qty').value = "1";
    });

    function updateTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = records.map((r, i) => `
            <tr>
                <td>${r.user}</td>
                <td style="text-align:left">${r.name}</td>
                <td><code style="font-size:10px">${r.barcode}</code></td>
                <td style="font-weight:bold; color:var(--accent)">${r.qty}</td>
                <td>${r.compStock}</td>
                <td>${r.note}</td>
                <td><button style="background:none; color:red; border:1px solid red; padding:2px 5px; border-radius:4px" onclick="deleteItem(${i})">刪除</button></td>
            </tr>
        `).join('');
    }

    window.deleteItem = (i) => {
        if(confirm("確定刪除此筆？")) { records.splice(i, 1); updateTable(); saveToLocal(); }
    };

    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
    function loadLocal() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) { records = JSON.parse(data); updateTable(); }
    }

    // 匯出 Excel (使用中文欄位)
    function exportExcel() {
        if (!records.length) return alert("目前沒有資料");
        
        // 映射中文標題
        const excelData = records.map(r => ({
            "使用者": r.user,
            "品名": r.name,
            "條碼": r.barcode,
            "盤點數量": r.qty,
            "電腦庫存量": r.compStock,
            "效期": r.expiry,
            "儲位/備註": r.note,
            "紀錄時間": r.time
        }));

        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "盤點結果");
        XLSX.writeFile(wb, `祥威盤點表_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function clearAll() {
        if (confirm("確定要清空此手機的所有紀錄嗎？")) {
            records = []; updateTable(); localStorage.removeItem(STORAGE_KEY);
        }
    }

    document.getElementById('btn-torch').addEventListener('click', async () => {
        if (!scanner) return;
        isTorchOn = !isTorchOn;
        try { await scanner.applyVideoConstraints({ torch: isTorchOn }); } catch (e) {}
    });

    document.getElementById('btn-start').addEventListener('click', startScanner);
    document.getElementById('btn-stop').addEventListener('click', () => { if(scanner) scanner.stop(); });

    initCloudDB();
    loadLocal();
</script>
</body>
</html>
