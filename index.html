<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>祥威藥局盤點工具 (雲端快速掃描版)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #16a085;
            --primary-soft: #e8f7f3;
            --accent: #f39c12;
            --danger: #e74c3c;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #dde3ea;
            --bg-body: #f5f7fb;
            --bg-card: #ffffff;
            --radius-md: 10px;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            margin: 0; padding: 12px; background: var(--bg-body); color: var(--text-main);
            line-height: 1.4;
        }

        h1 {
            font-size: 20px; margin: 4px auto 10px; text-align: center; color: var(--primary);
            letter-spacing: 1px; border-bottom: 2px solid var(--primary); display: table; padding-bottom: 4px;
        }

        .page-container { max-width: 720px; margin: 0 auto; }

        .section {
            background: var(--bg-card); border-radius: var(--radius-md);
            padding: 12px; margin-bottom: 12px; box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .section h2 {
            font-size: 15px; margin: 0 0 8px 0; display: flex; align-items: center; gap: 6px; color: var(--text-main);
        }

        .section h2::before { content: "●"; font-size: 10px; color: var(--primary); }

        label { display: block; margin-top: 10px; font-size: 14px; font-weight: 500; }

        input, select {
            width: 100%; font-size: 16px; padding: 8px; margin-top: 5px;
            border-radius: 6px; border: 1px solid var(--border-color);
            outline: none; background-color: #fbfcff;
        }

        input:focus { border-color: var(--primary); background-color: #fff; }

        .small { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* 掃描區域優化 */
        #reader {
            width: 100%; max-width: 450px; margin: 10px auto 0;
            border-radius: 12px; overflow: hidden; border: 2px solid var(--primary);
            background: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        #last-result {
            margin-top: 8px; padding: 6px; border-radius: 6px;
            background: #eef2f7; border-left: 4px solid var(--primary); font-weight: bold;
        }

        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

        button {
            flex: 1; min-width: 120px; font-size: 15px; padding: 10px;
            border-radius: 8px; border: none; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            gap: 6px; font-weight: 600; transition: all 0.2s;
        }

        button:active { transform: scale(0.95); }

        #start-scan { background: var(--primary); color: #fff; }
        #stop-scan { background: #6c757d; color: #fff; }
        #add-row { background: var(--accent); color: #fff; width: 100%; margin-top: 15px; font-size: 17px; }
        #download-xlsx { background: #3498db; color: #fff; }
        #clear-all { background: #fbe9e7; color: var(--danger); }

        .expiry-row { display: flex; gap: 4px; align-items: center; }

        /* 資料庫狀態標籤 */
        #db-status {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: bold; margin-bottom: 8px;
        }
        .loading { background: #ffeaa7; color: #d35400; }
        .success { background: #bcffdb; color: #0f7d45; }
        .error { background: #ff7675; color: #fff; }

        /* 表格優化 */
        .table-wrapper {
            width: 100%; overflow-x: auto; margin-top: 10px;
            border-radius: 8px; border: 1px solid #e1e7ee;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th, td { padding: 10px 8px; border-bottom: 1px solid #edf0f5; text-align: center; }
        th { background: #f8fafc; color: #64748b; position: sticky; top: 0; }
        
        .delete-btn { background: #fff1f0; color: #e74c3c; border: 1px solid #ffa39e; padding: 4px 8px; min-width: auto; }

        @media (max-width: 480px) {
            h1 { font-size: 18px; }
            button { font-size: 14px; padding: 12px 8px; }
        }
    </style>
</head>
<body>

<div class="page-container">
    <h1>祥威藥局盤點工具</h1>

    <div class="section">
        <div id="db-status" class="loading">正在連線 Google 試算表...</div>
        <div class="small">資料網址：已連接至 2PACX...WBR05t</div>
    </div>

    <div class="section">
        <h2>1. 條碼掃描 (針對一維條碼優化)</h2>
        <div class="btn-group">
            <button id="start-scan">📷 開啟相機</button>
            <button id="stop-scan">關閉相機</button>
        </div>
        <div id="reader"></div>
        <div id="last-result">尚未掃描</div>
        <div class="small" style="color: var(--accent); font-weight: bold;">
            提示：保持 10-15 公分距離，若條碼太小可「雙擊畫面」放大。
        </div>
    </div>

    <div class="section">
        <h2>2. 確認資料</h2>
        <label>條碼：<input type="text" id="barcode" placeholder="請掃描或手動輸入"></label>
        <label>品名：<input type="text" id="name" placeholder="雲端自動帶入..."></label>
        
        <label>效期 (年/月/日)：
            <div class="expiry-row">
                <select id="exp-year"><option value="">年</option></select>
                <select id="exp-month">
                    <option value="">月</option>
                    <option value="1">01</option><option value="2">02</option><option value="3">03</option>
                    <option value="4">04</option><option value="5">05</option><option value="6">06</option>
                    <option value="7">07</option><option value="8">08</option><option value="9">09</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                </select>
                <select id="exp-day"><option value="">日</option></select>
            </div>
        </label>

        <label>數量：<input type="number" id="qty" min="1" value="1"></label>
        <label>備註：<input type="text" id="note" placeholder="門市位置、庫房等"></label>

        <button id="add-row">➕ 加入盤點清單</button>
    </div>

    <div class="section">
        <h2>3. 目前盤點清單</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>品名</th><th>條碼</th><th>數量</th><th>效期</th><th>時間</th><th>操作</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <div class="btn-group" style="margin-top: 15px;">
            <button id="download-xlsx">📥 匯出 Excel</button>
            <button id="clear-all">🗑️ 清空全部</button>
        </div>
    </div>
</div>

<script>
    // ===== 配置區 =====
    const ONLINE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRYlvRc0iS91LtXg1laxAMKADMYTXOFGHENh3E-g5QqDCV08F1O8PzfzWEiGdAAwzJpkeiJ2rWBR05t/pub?gid=1142644173&single=true&output=csv";
    const STORAGE_KEY = "xiangwei_inventory_v1";

    let records = [];
    let barcodeNameMap = {};
    let html5QrCode = null;
    let scanning = false;
    let videoTrack = null;

    // DOM 元素
    const barcodeInput = document.getElementById("barcode");
    const nameInput = document.getElementById("name");
    const expYearSel = document.getElementById("exp-year");
    const expMonthSel = document.getElementById("exp-month");
    const expDaySel = document.getElementById("exp-day");
    const qtyInput = document.getElementById("qty");
    const noteInput = document.getElementById("note");
    const tableBody = document.getElementById("table-body");
    const dbStatusEl = document.getElementById("db-status");
    const lastResultEl = document.getElementById("last-result");

    // ===== 核心功能：雲端讀取資料庫 =====
    async function fetchOnlineDatabase() {
        try {
            const response = await fetch(ONLINE_CSV_URL);
            if (!response.ok) throw new Error("網路請求失敗");
            
            const text = await response.text();
            const lines = text.split(/\r?\n/);
            const map = {};
            
            for (let line of lines) {
                if (!line.trim()) continue;
                // 解析 CSV，處理可能包含逗號的品名
                let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    let id = cols[0].replace(/^"|"$/g, '').trim();
                    let name = cols[1].replace(/^"|"$/g, '').trim();
                    if (id && id !== "item_id") map[id] = name;
                }
            }
            barcodeNameMap = map;
            dbStatusEl.textContent = `✅ 雲端更新成功！共 ${Object.keys(map).length} 筆資料`;
            dbStatusEl.className = "success";
        } catch (e) {
            console.error(e);
            dbStatusEl.textContent = "❌ 雲端同步失敗，請檢查網路";
            dbStatusEl.className = "error";
        }
    }

    // ===== 核心功能：高速掃描配置 =====
    async function startScanning() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        if (scanning) return;

        const config = {
            fps: 30, // 提高偵測頻率
            qrbox: { width: 320, height: 150 }, // 扁平盒狀，適合 1D 條碼
            aspectRatio: 1.0,
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true // 重要：開啟 Chrome 內建硬體加速
            },
            videoConstraints: {
                facingMode: "environment",
                width: { min: 640, ideal: 1280, max: 1920 },
                height: { min: 480, ideal: 720, max: 1080 },
                focusMode: "continuous" // 連續對焦
            }
        };

        try {
            await html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                onScanSuccess(decodedText);
            });
            scanning = true;
            lastResultEl.textContent = "🔍 掃描中...";
            setupDoubleTapZoom();
        } catch (err) {
            alert("相機啟動失敗：請確認網址為 HTTPS 或檢查權限。");
        }
    }

    function onScanSuccess(decodedText) {
        barcodeInput.value = decodedText;
        lastResultEl.textContent = "最新掃描：" + decodedText;
        
        // 自動帶入品名
        if (barcodeNameMap[decodedText]) {
            nameInput.value = barcodeNameMap[decodedText];
        } else {
            nameInput.value = "";
            nameInput.placeholder = "資料庫無此條碼，請手動輸入";
        }
        // 震動回饋 (如果手機支援)
        if (navigator.vibrate) navigator.vibrate(50);
    }

    // 雙擊畫面放大功能
    function setupDoubleTapZoom() {
        const video = document.querySelector("#reader video");
        if (!video) return;
        video.addEventListener("dblclick", () => {
            const tracks = video.srcObject.getVideoTracks();
            if (tracks.length > 0) {
                const track = tracks[0];
                const caps = track.getCapabilities();
                if (caps.zoom) {
                    const currentZoom = track.getConstraints().advanced?.find(a => a.zoom)?.zoom || 1;
                    const targetZoom = currentZoom > 1 ? 1 : caps.zoom.max / 2;
                    track.applyConstraints({ advanced: [{ zoom: targetZoom }] });
                }
            }
        });
    }

    // ===== 資料管理功能 =====
    function addRecord() {
        const bc = barcodeInput.value.trim();
        const nm = nameInput.value.trim();
        if (!bc) return alert("請輸入或掃描條碼");

        const expiry = `${expYearSel.value}/${expMonthSel.value}/${expDaySel.value}`.replace(/\/+$/, "");

        const newRec = {
            name: nm,
            barcode: bc,
            qty: qtyInput.value,
            expiry: expiry,
            note: noteInput.value,
            time: new Date().toLocaleTimeString()
        };

        records.unshift(newRec); // 新的排前面
        renderTable();
        saveData();

        // 加入後清空輸入框，方便下一筆
        barcodeInput.value = "";
        nameInput.value = "";
        qtyInput.value = "1";
    }

    function renderTable() {
        tableBody.innerHTML = "";
        records.forEach((r, i) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${r.name}</td>
                <td><code style="font-size:11px">${r.barcode}</code></td>
                <td>${r.qty}</td>
                <td>${r.expiry}</td>
                <td>${r.time}</td>
                <td><button class="delete-btn" onclick="deleteRec(${i})">刪除</button></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    window.deleteRec = (i) => {
        records.splice(i, 1);
        renderTable();
        saveData();
    };

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            records = JSON.parse(raw);
            renderTable();
        }
    }

    // 初始化年份選單
    function initSelects() {
        const y = new Date().getFullYear();
        for (let i = 0; i <= 10; i++) {
            const opt = document.createElement("option");
            opt.value = y + i; opt.textContent = y + i;
            expYearSel.appendChild(opt);
        }
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement("option");
            opt.value = i; opt.textContent = i;
            expDaySel.appendChild(opt);
        }
    }

    // 匯出 Excel
    document.getElementById("download-xlsx").addEventListener("click", () => {
        if (!records.length) return alert("沒有盤點資料可匯出");
        const ws = XLSX.utils.json_to_sheet(records);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "盤點紀錄");
        XLSX.writeFile(wb, `祥威盤點_${new Date().toLocaleDateString()}.xlsx`);
    });

    // 事件監聽
    document.getElementById("start-scan").addEventListener("click", startScanning);
    document.getElementById("stop-scan").addEventListener("click", async () => {
        if (html5QrCode) {
            await html5QrCode.stop();
            scanning = false;
            lastResultEl.textContent = "已關閉相機";
        }
    });
    document.getElementById("add-row").addEventListener("click", addRecord);
    document.getElementById("clear-all").addEventListener("click", () => {
        if (confirm("確定要清空這支手機目前的盤點資料嗎？資料無法復原喔！")) {
            records = [];
            renderTable();
            localStorage.removeItem(STORAGE_KEY);
        }
    });

    // 條碼手動變動時也嘗試帶出品名
    barcodeInput.addEventListener("input", () => {
        const v = barcodeInput.value.trim();
        if (barcodeNameMap[v]) nameInput.value = barcodeNameMap[v];
    });

    // 系統初始化
    (async function init() {
        initSelects();
        loadData();
        await fetchOnlineDatabase();
    })();

</script>

</body>
</html>
