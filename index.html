<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>盤點掃條碼工具 - 雲端更新版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #16a085;   /* 主色：藍綠 */
            --primary-soft: #e8f7f3;
            --accent: #f39c12;    /* 強調色：橘色 */
            --danger: #e74c3c;    /* 刪除、警告用 */
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #dde3ea;
            --bg-body: #f5f7fb;
            --bg-card: #ffffff;
            --radius-md: 10px;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            margin: 0;
            padding: 12px;
            background: var(--bg-body);
            color: var(--text-main);
        }

        h1 {
            font-size: 20px;
            margin: 4px auto 10px;
            text-align: center;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .page-container { max-width: 720px; margin: 0 auto; }

        .section {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .section h2 {
            font-size: 16px;
            margin: 0 0 6px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section h2::before {
            content: "●";
            font-size: 10px;
            color: var(--primary);
        }

        label { display: block; margin-top: 8px; font-size: 14px; color: var(--text-main); }

        input, select {
            width: 100%;
            font-size: 15px;
            padding: 6px 8px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            outline: none;
            transition: border-color 0.15s, background-color 0.15s;
            background-color: #fbfcff;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .small { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

        .expiry-row { display: flex; gap: 4px; align-items: center; }
        .expiry-row select { flex: 1 1 auto; }
        .expiry-row span { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

        #reader {
            width: 100%;
            max-width: 420px;
            margin: 8px auto 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px dashed var(--border-color);
            background: #000;
        }

        #last-result {
            margin-top: 6px;
            padding: 4px 6px;
            border-radius: 6px;
            background: #f8fafc;
            border: 1px dashed #e1e7ee;
        }

        /* 按鈕樣式 */
        button {
            font-size: 15px;
            padding: 7px 10px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            margin-right: 6px;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: transform 0.08s ease;
            white-space: nowrap;
        }

        button:active { transform: translateY(1px) scale(0.99); }

        #start-scan { background: var(--primary); color: #fff; box-shadow: 0 3px 8px rgba(22,160,133,0.3); }
        #stop-scan { background: #ecf0f1; color: #34495e; }
        #add-row { background: var(--accent); color: #fff; box-shadow: 0 3px 8px rgba(243,156,18,0.3); }
        #download-xlsx { background: #3498db; color: #fff; }
        #clear-all { background: #fbe9e7; color: var(--danger); }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #e1e7ee;
            background: #fff;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 640px; }
        th, td { padding: 6px; border-bottom: 1px solid #edf0f5; text-align: center; }
        th { background: #f5f7fb; font-weight: 600; position: sticky; top: 0; z-index: 1; }

        @media (max-width: 480px) {
            button { width: calc(50% - 6px); }
        }
        
        /* 線上更新狀態條 */
        #db-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            display: inline-block;
        }
        .status-loading { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="page-container">
    <h1>祥威藥局盤點工具 (雲端版)</h1>

    <div class="section">
        <h2>資料庫狀態</h2>
        <div id="db-status" class="status-loading">正在從雲端更新品名資料...</div>
        <div class="small">※ 每次開啟網頁皆會自動讀取 Google 試算表最新資料。</div>
    </div>

    <div class="section">
        <h2>0. 使用者</h2>
        <label>使用者名稱：<input type="text" id="user" placeholder="例如：小明"></label>
    </div>

    <div class="section">
        <h2>1. 條碼掃描</h2>
        <div class="scan-buttons">
            <button id="start-scan">開始掃描</button>
            <button id="stop-scan">停止掃描</button>
        </div>
        <div id="reader"></div>
        <div id="last-result" class="small">最後掃描結果：尚未掃描</div>
        <div id="zoom-hint" class="small"></div>
    </div>

    <div class="section">
        <h2>2. 資料輸入</h2>
        <label>條碼：<input type="text" id="barcode" placeholder="掃描後自動帶入"></label>
        <label>品名：<input type="text" id="name" placeholder="自動對照或手動輸入"></label>
        <label>效期：
            <div class="expiry-row">
                <select id="exp-year"><option value="">年</option></select><span>年</span>
                <select id="exp-month">
                    <option value="">月</option>
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                </select><span>月</span>
                <select id="exp-day"><option value="">日</option></select><span>日</span>
            </div>
        </label>
        <label>數量：<input type="number" id="qty" min="1" value="1"></label>
        <label>備註：<input type="text" id="note" placeholder="可不填"></label>
        <button id="add-row">加入清單</button>
    </div>

    <div class="section">
        <h2>3. 目前清單</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>#</th><th>使用者</th><th>條碼</th><th>品名</th><th>效期</th><th>數量</th><th>備註</th><th>建立時間</th><th>刪除</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <div class="list-buttons">
            <button id="download-xlsx">下載 Excel</button>
            <button id="clear-all">清空全部</button>
        </div>
    </div>
</div>

<script>
    // ===== 1. 你的 Google Sheets CSV 網址 =====
    const ONLINE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRYlvRc0iS91LtXg1laxAMKADMYTXOFGHENh3E-g5QqDCV08F1O8PzfzWEiGdAAwzJpkeiJ2rWBR05t/pub?gid=1142644173&single=true&output=csv";

    // 基本變數
    const STORAGE_KEY = "inventory_records_v3";
    const records = [];
    let barcodeNameMap = {};
    let html5QrCode = null;
    let scanning = false;
    let videoTrack = null;

    // DOM 元素
    const userInput = document.getElementById("user");
    const barcodeInput = document.getElementById("barcode");
    const nameInput = document.getElementById("name");
    const expYearSel = document.getElementById("exp-year");
    const expMonthSel = document.getElementById("exp-month");
    const expDaySel = document.getElementById("exp-day");
    const qtyInput = document.getElementById("qty");
    const noteInput = document.getElementById("note");
    const tableBody = document.getElementById("table-body");
    const dbStatusEl = document.getElementById("db-status");
    const lastResultEl = document.getElementById("last-result");
    const zoomHintEl = document.getElementById("zoom-hint");

    const startScanBtn = document.getElementById("start-scan");
    const stopScanBtn = document.getElementById("stop-scan");
    const addRowBtn = document.getElementById("add-row");
    const downloadXlsxBtn = document.getElementById("download-xlsx");
    const clearAllBtn = document.getElementById("clear-all");

    // ===== 2. 線上更新邏輯 =====
    async function fetchOnlineDatabase() {
        try {
            dbStatusEl.textContent = "正在連線雲端資料庫...";
            dbStatusEl.className = "status-loading";

            const response = await fetch(ONLINE_CSV_URL);
            if (!response.ok) throw new Error("網路請求失敗");
            
            const text = await response.text();
            const map = {};
            const lines = text.split(/\r?\n/);
            
            // 解析 CSV (假設 A 欄是 item_id, B 欄是 cname)
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                // 簡單處理 CSV 分隔 (處理逗號與引號)
                let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 2) {
                    let bc = cols[0].replace(/^"|"$/g, '').trim();
                    let nm = cols[1].replace(/^"|"$/g, '').trim();
                    // 排除標題列
                    if (bc && bc !== "item_id" && bc !== "條碼") {
                        map[bc] = nm;
                    }
                }
            }

            barcodeNameMap = map;
            const count = Object.keys(map).length;
            dbStatusEl.textContent = `✅ 雲端更新成功！共載入 ${count} 筆藥品資料。`;
            dbStatusEl.className = "status-success";
            
        } catch (e) {
            console.error(e);
            dbStatusEl.textContent = "❌ 雲端讀取失敗，將無法自動帶入品名。";
            dbStatusEl.className = "status-error";
        }
    }

    // 初始化
    (async function init() {
        // 設定年份
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y <= currentYear + 10; y++) {
            const opt = document.createElement("option"); opt.value = y; opt.textContent = y;
            expYearSel.appendChild(opt);
        }
        // 設定日期
        for (let d = 1; d <= 31; d++) {
            const opt = document.createElement("option"); opt.value = d; opt.textContent = d;
            expDaySel.appendChild(opt);
        }

        loadRecordsFromStorage();
        await fetchOnlineDatabase();
    })();

    // 條碼變動自動帶出品名
    barcodeInput.addEventListener("change", () => {
        const val = barcodeInput.value.trim();
        if (barcodeNameMap[val]) {
            nameInput.value = barcodeNameMap[val];
        }
    });

    // 掃描成功回呼
    function onScanSuccess(decodedText) {
        barcodeInput.value = decodedText;
        lastResultEl.textContent = "最後掃描結果：" + decodedText;
        if (barcodeNameMap[decodedText]) {
            nameInput.value = barcodeNameMap[decodedText];
        } else {
            nameInput.value = "";
        }
        qtyInput.value = "1";
    }

    // 啟動相機
    startScanBtn.addEventListener("click", async () => {
        try {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            if (scanning) return;

            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: { width: 300, height: 150 }, aspectRatio: 4/3 },
                onScanSuccess
            );
            scanning = true;
            lastResultEl.textContent = "最後掃描結果：掃描中...";
        } catch (err) {
            alert("相機開啟失敗，請檢查權限或是否為 HTTPS 網址。");
        }
    });

    stopScanBtn.addEventListener("click", async () => {
        if (html5QrCode && scanning) {
            await html5QrCode.stop();
            scanning = false;
            lastResultEl.textContent = "最後掃描結果：已停止";
        }
    });

    // 加入清單
    addRowBtn.addEventListener("click", () => {
        const barcode = barcodeInput.value.trim();
        if (!barcode) return alert("請輸入條碼");

        const expiry = `${expYearSel.value}/${expMonthSel.value}/${expDaySel.value}`.replace(/\/+$/, "");

        records.push({
            user: userInput.value.trim(),
            barcode: barcode,
            name: nameInput.value.trim(),
            expiryDisplay: expiry,
            qty: qtyInput.value,
            note: noteInput.value.trim(),
            createdAt: new Date().toLocaleString()
        });

        renderTable();
        saveRecordsToStorage();

        barcodeInput.value = "";
        nameInput.value = "";
        qtyInput.value = "1";
    });

    function renderTable() {
        tableBody.innerHTML = "";
        records.forEach((rec, i) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${i + 1}</td><td>${rec.user}</td><td>${rec.barcode}</td>
                <td>${rec.name}</td><td>${rec.expiryDisplay}</td><td>${rec.qty}</td>
                <td>${rec.note}</td><td>${rec.createdAt}</td>
                <td><button onclick="deleteRecord(${i})">刪除</button></td>
            `;
            tableBody.appendChild(tr);
        });
    }

    window.deleteRecord = (i) => {
        records.splice(i, 1);
        renderTable();
        saveRecordsToStorage();
    };

    function saveRecordsToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ records })); }
    function loadRecordsFromStorage() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            JSON.parse(raw).records.forEach(r => records.push(r));
            renderTable();
        }
    }

    downloadXlsxBtn.addEventListener("click", () => {
        if (!records.length) return alert("沒有資料");
        const ws = XLSX.utils.json_to_sheet(records);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "盤點紀錄");
        XLSX.writeFile(wb, `盤點_${new Date().toLocaleDateString()}.xlsx`);
    });

    clearAllBtn.addEventListener("click", () => {
        if (confirm("確定清空全部？")) {
            records.length = 0;
            renderTable();
            localStorage.removeItem(STORAGE_KEY);
        }
    });
</script>
</body>
</html>
